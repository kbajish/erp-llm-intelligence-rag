name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.dev.txt

      - name: Run tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t erp-api:${{ github.sha }} .

      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t erp-dashboard:${{ github.sha }} .